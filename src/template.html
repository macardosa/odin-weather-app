<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Application</title>
    <link rel="shortcut icon" href="./assets/icons/favicon.svg" type="image/x-icon">
</head>
<body>
    <main>
        <header>
            <h1>Weather</h1>
            <img src="./assets/icons/refresh.svg" alt="" class="refresh-icon">
            <div class="last-update"></div>
        </header>
        <div class="cards-wrapper"></div>
        <div class="search-form">
            <input name="search-bar" placeholder="Search for a city, town or airport" class="search-bar">
            <img src="./assets/icons/search.svg" alt="" class="search-icon">
        </div>
    </main>
</body>
</html>
